<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>En memoria de mi abuelo</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #f5f5f5;
    color: #333;
    text-align: center;
}

header {
    background-color: #6d4c41;
    color: white;
    padding: 40px 20px;
}

header img {
    width: 180px;
    height: 180px;
    object-fit: cover;
    border-radius: 50%;
    border: 4px solid white;
    margin-bottom: 20px;
}

h1 {
    margin: 10px 0;
}

.galeria {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    padding: 30px 20px;
}

.galeria img {
    width: 250px;
    max-width: 90%;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.2s;
}

.galeria img:hover {
    transform: scale(1.03);
}

footer {
    padding: 25px;
    color: #777;
}
</style>
</head>

<body>

<header>
    <img src="images/principal.jpg" alt="Foto principal">

    <h1>En memoria de [Nombre de tu abuelo]</h1>

    <p>[Fecha de nacimiento] – [Fecha de fallecimiento]</p>

    <p>
        "Tu amor y tus enseñanzas vivirán siempre en nuestros corazones."
    </p>
</header>

<h2>Galería de recuerdos</h2>

<div class="galeria">
    <img src="images/foto1.jpg" alt="">
    <img src="images/foto2.jpg" alt="">
    <img src="images/foto3.jpg" alt="">
</div>

<footer>
    Siempre vivirás en nuestros corazones.
</footer>

</body>
</html>
